services:
  backend:
    build:
      context: ./src/backend
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - ENVIRONMENT=development
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - ./src/backend/app:/app/app
    command: ["/app/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - app-network

  frontend:
    build:
      context: ./src/frontend
      target: deps
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8000
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
