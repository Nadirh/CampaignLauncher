services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-campaignlauncher}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-campaignlauncher}
      - POSTGRES_DB=${POSTGRES_DB:-campaignlauncher}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaignlauncher"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./src/backend
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - ENVIRONMENT=development
      - SENTRY_DSN=${SENTRY_DSN:-}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-campaignlauncher}:${POSTGRES_PASSWORD:-campaignlauncher}@db:5432/${POSTGRES_DB:-campaignlauncher}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./src/backend/app:/app/app
      - ./docs:/app/docs:ro
    command: ["/app/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./src/frontend
      target: deps
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8000
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
